apiVersion: batch/v1
kind: CronJob
metadata:
  name: simple-cron
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cron
              image: busybox
              command: ["sh", "-c", "date; echo Cron 실행"]
          restartPolicy: OnFailure